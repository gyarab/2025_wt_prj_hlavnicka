# Cílové servery pro nasazení FilmDB. Verzovaný (commitnutý) inventář —
# uživatele i host si tu klidně uprav. Tajný je jen SSH klíč (GitHub secret
# SSH_PRIVATE_KEY), kterým se na server přihlásíme.
#
#   ansible_host  – doménové jméno / IP serveru
#   ansible_user  – SSH uživatel (musí mít právo používat docker)
#   project_dir   – kam se na serveru rozbalí zdroják a postaví stack
[web]
gawt ansible_host=gawt.dtcloud.cz ansible_user=hlavnicka project_dir=/home/hlavnicka/contextum
